# version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: sms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_management
      MYSQL_USER: sms_user
      MYSQL_PASSWORD: sms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: sms_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_NAME: Student Management System
      APP_VERSION: 1.0.0
      APP_ENV: development
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: 8000
      MYSQLHOST: mysql
      MYSQLPORT: 3306
      MYSQLUSER: sms_user
      MYSQLPASSWORD: sms_password
      MYSQLDATABASE: student_management
      MYSQL_POOL_NAME: sms_pool
      MYSQL_POOL_SIZE: 5
      LOG_LEVEL: INFO
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

volumes:
  mysql_data:
